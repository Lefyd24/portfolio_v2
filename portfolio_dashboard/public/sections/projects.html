<section id="projects" data-route-title="Projects" class="space-y-6">
  <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
    <div>
      <h2 class="text-2xl font-semibold">Projects</h2>
      <p class="mt-1 text-sm opacity-70">Selected work across internal SaaS, on-demand client websites (e.g. <a href="https://karaviotislaw.gr/" target="_blank" rel="noreferrer" class="link link-secondary link-hover">Karaviotis Law</a>), and research. Click a card for details.</p>
    </div>

    <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
      <label class="input input-bordered flex items-center gap-2">
        <input id="project-search" type="text" class="grow" placeholder="Search projects, tech, impact…" />
        <kbd class="kbd kbd-sm hidden sm:inline-flex">/</kbd>
      </label>
    </div>
  </div>

  <div class="flex gap-6 lg:gap-8">
    <!-- Vertical steps indicator -->
    <aside class="hidden lg:block shrink-0">
      <nav class="sticky top-24" aria-label="Project sections">
        <ol id="project-steps" class="steps steps-vertical">
          <li class="step step-primary cursor-pointer hover:opacity-90 transition-opacity" data-step="saas" data-scroll-to="section-saas">
            <span class="text-sm font-medium">SaaS Projects</span>
          </li>
          <li class="step cursor-pointer hover:opacity-90 transition-opacity" data-step="websites" data-scroll-to="section-websites">
            <span class="text-sm font-medium">Client Websites</span>
          </li>
          <li class="step cursor-pointer hover:opacity-90 transition-opacity" data-step="research" data-scroll-to="section-research">
            <span class="text-sm font-medium">Research</span>
          </li>
        </ol>
      </nav>
    </aside>

    <!-- Project sections -->
    <div class="flex-1 min-w-0 space-y-16">
      <section id="section-saas" class="scroll-mt-24" data-section="saas">
        <h3 class="text-xl font-semibold mb-4 flex items-center gap-2">
          <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-primary/20 text-primary text-sm font-bold">1</span>
          SaaS Projects
        </h3>
        <div id="projects-grid-saas" class="grid grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-3">
          <!-- Cards injected by renderProjects() -->
        </div>
      </section>

      <section id="section-websites" class="scroll-mt-24" data-section="websites">
        <h3 class="text-xl font-semibold mb-4 flex items-center gap-2">
          <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-secondary/20 text-secondary text-sm font-bold">2</span>
          Client Websites
        </h3>
        <div id="projects-grid-websites" class="grid grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-3">
          <!-- Cards injected by renderProjects() -->
        </div>
      </section>

      <section id="section-research" class="scroll-mt-24" data-section="research">
        <h3 class="text-xl font-semibold mb-4 flex items-center gap-2">
          <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-accent/20 text-accent text-sm font-bold">3</span>
          Research
        </h3>
        <div id="projects-grid-research" class="grid grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-3">
          <!-- Cards injected by renderProjects() -->
        </div>
      </section>
    </div>
  </div>
</section>
