<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient — deep navy -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a2748"/>
      <stop offset="100%" stop-color="#0c1428"/>
    </linearGradient>

    <!-- Champagne/ivory gold — matches the dot in the favicon exactly -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EDE8D0"/>
      <stop offset="50%"  stop-color="#d9d4b9"/>
      <stop offset="100%" stop-color="#9b967a"/>
    </linearGradient>

    <!-- Gold fade left-to-right for the rule line -->
    <linearGradient id="goldfade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#EDE8D0"/>
      <stop offset="60%"  stop-color="#d9d4b9"/>
      <stop offset="100%" stop-color="#9b967a" stop-opacity="0"/>
    </linearGradient>

    <!-- Vertical gold fade for divider -->
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#EDE8D0" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#d9d4b9" stop-opacity="0.35"/>
      <stop offset="75%"  stop-color="#d9d4b9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9b967a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Outer border frame — very subtle gold -->
  <rect x="20" y="20" width="1160" height="590"
        rx="16" fill="none"
        stroke="url(#gold)" stroke-width="1" opacity="0.3"/>

  <!-- ── LEFT: Monogram mark ── -->
