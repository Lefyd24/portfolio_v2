  <!-- Thin rule before stats -->
  <line x1="554" y1="422" x2="1140" y2="422"
        stroke="#ffffff" stroke-width="0.5" opacity="0.07"/>

  <!-- Stats row -->
  <!-- 5+ years -->
  <text x="554" y="478" fill="#ffffff"
        font-family="Georgia, serif" font-size="42">5+</text>
  <text x="554" y="504" fill="#3a4860"
        font-family="'Courier New', monospace"
        font-size="10.5" letter-spacing="2.5">YEARS CODING</text>

  <line x1="652" y1="448" x2="652" y2="512"
        stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- 6 apps -->
  <text x="668" y="478" fill="#ffffff"
        font-family="Georgia, serif" font-size="42">6</text>
  <text x="668" y="504" fill="#3a4860"
        font-family="'Courier New', monospace"
        font-size="10.5" letter-spacing="2.5">ENTERPRISE APPS</text>

  <line x1="810" y1="448" x2="810" y2="512"
        stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- GPA -->
  <text x="826" y="478" fill="#ffffff"
